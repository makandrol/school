<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адмін — Матеріали уроків</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#1a1a2e;--text:#e0e0e0;--muted:#888;--border:#2a2a3e;
  --purple:#667eea;--green:#00b894;--accent:#f39c12;--red:#e74c3c}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

/* Login screen */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--card);padding:40px;border-radius:16px;border:1px solid var(--border);text-align:center;max-width:360px;width:90%}
.login-box h2{margin-bottom:20px;font-size:1.3em}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:#0d0d1a;color:var(--text);font-size:1em;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--purple)}
.login-box button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--purple),#764ba2);color:#fff;font-size:1em;cursor:pointer;font-weight:600}
.login-box button:hover{opacity:.9}
.login-box .error{color:var(--red);font-size:.85em;margin-top:8px;display:none}
.hidden{display:none!important}

/* Header */
.header{text-align:center;padding:30px 20px 10px;background:linear-gradient(135deg,#1a1a2e,#16213e);position:relative}
.header h1{font-size:1.8em;margin-bottom:4px}
.header p{color:var(--muted);font-size:.95em}
.top-actions{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:.85em;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);border-color:#555}
.btn.primary{background:linear-gradient(135deg,var(--purple),#764ba2);border:none;color:#fff}
.btn.primary:hover{opacity:.9}
.btn.danger{border-color:rgba(231,76,60,.3);color:var(--red)}
.btn.danger:hover{background:rgba(231,76,60,.1)}

/* Notification */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;background:#2d3436;color:#fff;font-size:.9em;z-index:9999;transform:translateX(120%);transition:transform .3s}
.toast.show{transform:translateX(0)}
.toast.success{border-left:4px solid var(--green)}
.toast.info{border-left:4px solid var(--purple)}

/* Tabs */
.tabs{display:flex;justify-content:center;gap:8px;padding:16px;flex-wrap:wrap}
.tab{padding:9px 20px;border-radius:25px;border:2px solid #333;background:transparent;color:var(--text);cursor:pointer;font-size:.9em;transition:all .3s}
.tab:hover{border-color:#555}
.tab.active[data-type=robotics]{border-color:var(--purple);background:rgba(102,126,234,.12);color:var(--purple)}
.tab.active[data-type=modeling]{border-color:var(--green);background:rgba(0,184,148,.12);color:var(--green)}

/* Container */
.container{max-width:1000px;margin:0 auto;padding:0 20px 60px}
.group{display:none;animation:fadeIn .3s}.group.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Group header */
.gh{display:flex;align-items:center;gap:12px;margin:16px 0;padding-bottom:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.badge{padding:4px 14px;border-radius:12px;font-size:.78em;font-weight:600}
.badge.robotics{background:rgba(102,126,234,.18);color:var(--purple)}
.badge.modeling{background:rgba(0,184,148,.18);color:var(--green)}
.gh h2{font-size:1.2em}.gh .schedule{margin-left:auto;color:var(--muted);font-size:.82em}

/* Extras */
.extras{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.extras a{padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.04);color:#aaa;font-size:.85em;border:1px solid var(--border)}
.extras a:hover{background:rgba(255,255,255,.08)}

/* Lesson rows */
.lesson-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:all .2s}
.lesson-row:hover{border-color:#444}
.lesson-row.draft{opacity:.6;border-left:3px solid var(--accent)}
.lesson-row.published{border-left:3px solid var(--green)}
.lesson-row.no-files{border-left:3px solid #333}
.lesson-info{flex:1;min-width:0}
.lesson-info .num{font-size:.75em;color:var(--muted)}
.lesson-info .title{font-size:.95em;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-info .date{font-size:.75em;color:var(--muted)}
.lesson-files{display:flex;gap:6px;flex-wrap:wrap}
.file-link{padding:4px 10px;border-radius:6px;font-size:.78em;background:rgba(255,255,255,.06);color:#aaa;transition:all .2s}
.file-link:hover{background:rgba(255,255,255,.12)}
.file-link.presentation{background:rgba(102,126,234,.12);color:#8b9cf7}
.file-link.handout{background:rgba(0,184,148,.12);color:#4fd1c5}
.file-link.classroom{background:rgba(66,133,244,.12);color:#6ea8fe}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#333;border-radius:24px;cursor:pointer;transition:.3s}
.toggle .slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:var(--green)}
.toggle input:checked+.slider:before{transform:translateX(20px);background:#fff}

/* Status badge */
.status-badge{font-size:.7em;padding:2px 8px;border-radius:6px;font-weight:600;flex-shrink:0}
.status-badge.pub{background:rgba(0,184,148,.15);color:var(--green)}
.status-badge.draft{background:rgba(243,156,18,.15);color:var(--accent)}
.status-badge.empty{background:rgba(255,255,255,.05);color:#555}

/* Changes bar */
.changes-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:12px;z-index:100;transform:translateY(100%);transition:transform .3s}
.changes-bar.show{transform:translateY(0)}
.changes-bar .info{color:var(--muted);font-size:.9em}
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 Вхід</h2>
    <input type="password" id="passInput" placeholder="Пароль" autofocus>
    <button onclick="tryLogin()">Увійти</button>
    <div class="error" id="loginError">Невірний пароль</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Main app (hidden until login) -->
<div id="app" class="hidden">
  <div class="header">
    <h1>⚙️ Адмін-панель</h1>
    <p>Керування матеріалами уроків</p>
    <div class="top-actions">
      <a href="index.html" target="_blank" class="btn">👁️ Публічний вигляд</a>
      <a href="gallery.html" target="_blank" class="btn">🏆 Галерея</a>
      <button class="btn primary" id="saveBtn" onclick="saveManifest()">💾 Зберегти manifest.json</button>
      <button class="btn" onclick="saveStudents()">👥 Зберегти students.json</button>
      <button class="btn danger" onclick="logout()">🚪 Вийти</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="container" id="content"></div>
</div>

<!-- Changes bar -->
<div class="changes-bar" id="changesBar">
  <span class="info" id="changesInfo"></span>
  <button class="btn primary" onclick="saveManifest()">💾 Зберегти</button>
  <button class="btn" onclick="discardChanges()">↩️ Скасувати</button>
</div>

<script>
// --- Auth ---
// Default password: "school2026"
// SHA-256 hash of the password. To change password, update this hash.
const PASS_HASH = '5e4d982a45de7366faf49e14cfc97e4d89fd8a46fc8bb0a72e29b5d15c103b5f';
let manifest = null;
let originalJson = '';
let changeCount = 0;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function tryLogin() {
  const pass = document.getElementById('passInput').value;
  const hash = await sha256(pass);
  if (hash === PASS_HASH) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadApp();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

function logout() {
  sessionStorage.removeItem('auth');
  location.reload();
}

// Check if already logged in
if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadApp();
}

// --- Toast ---
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// --- App ---
async function loadApp() {
  const r = await fetch('manifest.json?_=' + Date.now());
  manifest = await r.json();
  originalJson = JSON.stringify(manifest);
  renderAdmin();
}

function renderAdmin() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  tabsEl.innerHTML = manifest.groups.map((g, i) => {
    const icon = g.type === 'robotics' ? '🤖' : '🎨';
    return `<button class="tab${i===0?' active':''}" data-type="${g.type}" data-idx="${i}">${icon} ${g.name}</button>`;
  }).join('');

  contentEl.innerHTML = manifest.groups.map((g, gi) => {
    let html = `<div class="group${gi===0?' active':''}" data-gi="${gi}">`;
    html += `<div class="gh"><span class="badge ${g.type}">${g.type==='robotics'?'Робототехніка':'3D-моделювання'}</span>`;
    html += `<h2>${g.name}</h2><span class="schedule">📅 ${g.schedule}</span></div>`;

    if (g.extras && g.extras.length) {
      html += '<div class="extras">';
      g.extras.forEach(e => { html += `<a href="${g.path}/${e.file}" target="_blank">${e.label}</a>`; });
      html += '</div>';
    }

    g.lessons.forEach((l, li) => {
      const hasFiles = l.files && l.files.length;
      const isPub = !!l.published;
      const rowClass = hasFiles ? (isPub ? 'published' : 'draft') : 'no-files';
      const statusClass = hasFiles ? (isPub ? 'pub' : 'draft') : 'empty';
      const statusText = hasFiles ? (isPub ? 'Опубліковано' : 'Чернетка') : 'Без матеріалів';

      html += `<div class="lesson-row ${rowClass}">`;

      // Toggle (only if has files)
      if (hasFiles) {
        html += `<label class="toggle"><input type="checkbox" ${isPub?'checked':''} onchange="togglePublish(${gi},${li},this.checked)"><span class="slider"></span></label>`;
      } else {
        html += '<div style="width:44px"></div>';
      }

      html += '<div class="lesson-info">';
      html += `<div class="num">Урок ${l.n}</div>`;
      html += `<div class="title">${l.title}</div>`;
      html += `<div class="date">${l.date}</div>`;
      html += '</div>';

      html += `<span class="status-badge ${statusClass}">${statusText}</span>`;

      // File links
      if (hasFiles) {
        html += '<div class="lesson-files">';
        l.files.forEach(f => {
          const href = `${g.path}/lesson-${String(l.n).padStart(2,'0')}/${f}`;
          let cls = 'file-link';
          let label = f;
          if (f.includes('presentation')) { cls += ' presentation'; label = '🖥️ Презентація'; }
          else if (f.includes('handout')) { cls += ' handout'; label = '🖨️ Роздатковий'; }
          else if (f.includes('classroom')) { cls += ' classroom'; label = '📝 Classroom'; }
          html += `<a class="${cls}" href="${href}" target="_blank">${label}</a>`;
        });
        // MakeCode links
        if (l.makecode) {
          l.makecode.forEach(m => {
            html += `<a class="file-link" href="${m.url||'#'}" target="_blank" style="background:rgba(102,126,234,.1);color:#a0b0ff">🎮 ${m.label}${m.url?'':' ⚠️'}</a>`;
          });
        }
        // Tinkercad links
        if (l.tinkercad) {
          l.tinkercad.forEach(t => {
            html += `<a class="file-link" href="${t.url||'#'}" target="_blank" style="background:rgba(0,184,148,.1);color:#4fd1c5">🔗 ${t.label}${t.url?'':' ⚠️'}</a>`;
          });
        }
        html += '</div>';
      }

      html += '</div>';
    });

    html += '</div>';
    return html;
  }).join('');

  // Tab switching
  tabsEl.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      contentEl.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
      tab.classList.add('active');
      contentEl.querySelectorAll('.group')[tab.dataset.idx].classList.add('active');
    });
  });
}

function togglePublish(gi, li, checked) {
  manifest.groups[gi].lessons[li].published = checked;
  updateChangesBar();
  renderAdmin();
  // Restore active tab
}

function updateChangesBar() {
  const bar = document.getElementById('changesBar');
  const current = JSON.stringify(manifest);
  if (current !== originalJson) {
    // Count changes
    let count = 0;
    const orig = JSON.parse(originalJson);
    manifest.groups.forEach((g, gi) => {
      g.lessons.forEach((l, li) => {
        const origL = orig.groups[gi]?.lessons[li];
        if (origL && !!l.published !== !!origL.published) count++;
      });
    });
    document.getElementById('changesInfo').textContent = `${count} змін${count > 1 ? '' : 'а'}`;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

function discardChanges() {
  manifest = JSON.parse(originalJson);
  renderAdmin();
  document.getElementById('changesBar').classList.remove('show');
  toast('Зміни скасовано', 'info');
}

function saveManifest() {
  const json = JSON.stringify(manifest, null, 2) + '\n';
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'manifest.json';
  a.click();
  URL.revokeObjectURL(url);
  originalJson = JSON.stringify(manifest);
  document.getElementById('changesBar').classList.remove('show');
  toast('✅ manifest.json завантажено — замініть файл у проєкті та зробіть git push', 'success');
}

async function saveStudents() {
  try {
    const r = await fetch('students.json?_=' + Date.now());
    const data = await r.json();
    const json = JSON.stringify(data, null, 2) + '\n';
    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'students.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ students.json завантажено', 'success');
  } catch(e) {
    toast('❌ Помилка завантаження students.json', 'info');
  }
}
</script>
</body>
</html>
