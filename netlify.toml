[build]
  publish = "."
  command = ""

# Cache static assets (presentations, handouts)
[[headers]]
  for = "/robotics/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/3d/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Don't cache manifest & index (so updates appear quickly)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# Block access to internal files (plans, summaries, context)
[[redirects]]
  from = "/**/plan.md"
  to = "/index.html"
  status = 302

[[redirects]]
  from = "/**/summary.md"
  to = "/index.html"
  status = 302

[[redirects]]
  from = "/**/curriculum.md"
  to = "/index.html"
  status = 302

[[redirects]]
  from = "/shared/*"
  to = "/index.html"
  status = 302
