<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>Матеріали уроків</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--sidebar:#141432;--card:#1a1a2e;--text:#e0e0e0;--muted:#888;--border:#2a2a3e;
  --purple:#667eea;--purple2:#764ba2;--green:#00b894;--green2:#00cec9;--accent:#f39c12;--red:#e74c3c}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

/* Header */
.header{text-align:center;padding:24px 20px 0;background:linear-gradient(135deg,#1a1a2e,#16213e);position:relative}
.header h1{font-size:1.8em;margin-bottom:4px;background:linear-gradient(135deg,var(--purple),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{color:var(--muted);font-size:.9em;margin-bottom:16px}
.admin-link{position:absolute;top:12px;right:16px;color:#333;font-size:.7em;cursor:pointer;padding:4px 8px;border-radius:6px}
.admin-link:hover{color:#555;background:rgba(255,255,255,.05)}

/* Category tabs */
.cat-tabs{display:flex;justify-content:center;gap:0;margin:0 auto;max-width:600px}
.cat-tab{flex:1;padding:12px 24px;text-align:center;cursor:pointer;font-size:1em;font-weight:600;border-bottom:3px solid transparent;transition:all .2s;color:var(--muted)}
.cat-tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.cat-tab.active.robotics{border-bottom-color:var(--purple);color:var(--purple)}
.cat-tab.active.modeling{border-bottom-color:var(--green);color:var(--green)}

/* Main layout */
.main{display:flex;flex:1;max-width:1400px;width:100%;margin:0 auto}

/* Sidebar */
.sidebar{width:320px;min-width:320px;border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;max-height:calc(100vh - 120px);position:sticky;top:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.grp-header{padding:8px 20px;font-size:.82em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.grp-header .dot{width:6px;height:6px;border-radius:50%}
.grp-header .dot.robotics{background:var(--purple)}
.grp-header .dot.modeling{background:var(--green)}
.grp-schedule{padding:0 20px 6px;font-size:.72em;color:#555}
.lesson-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:.88em}
.lesson-item:hover{background:rgba(255,255,255,.04)}
.lesson-item.active{background:rgba(102,126,234,.1);border-left-color:var(--purple)}
.lesson-item.active.modeling-active{background:rgba(0,184,148,.08);border-left-color:var(--green)}
.lesson-item .num{color:var(--muted);font-size:.78em;min-width:24px}
.lesson-item .date{color:#555;font-size:.75em;min-width:70px}
.lesson-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-item.unpublished{opacity:.35}
.lesson-item.unpublished .name{font-style:italic}
.shared-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.65em;background:rgba(102,126,234,.15);color:var(--purple);margin-left:4px;vertical-align:middle}

/* Resource tabs inline */
.res-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.res-tab{padding:6px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.85em;transition:all .2s}
.res-tab:hover{background:rgba(102,126,234,.08);color:var(--text)}
.res-tab.active{background:rgba(102,126,234,.15);color:var(--purple);border-color:var(--purple)}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px}
.res-card a{color:#8b9cf7;font-weight:600;display:block;margin-bottom:2px}
.res-card a:hover{text-decoration:underline}
.res-card p{color:var(--muted);font-size:.88em}
.res-card table{width:100%;border-collapse:collapse;margin:6px 0;font-size:.88em}
.res-card th,.res-card td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.res-card th{background:rgba(102,126,234,.08);color:var(--purple)}
.res-section h3{font-size:1.05em;color:var(--purple);margin:16px 0 8px}
.b{display:inline-block;padding:2px 8px;border-radius:6px;margin:1px;font-size:.82em;font-weight:500;color:#fff}
.b.basic{background:#1e90ff}.b.input{background:#d672c0}.b.led{background:#e74c3c}
.b.var{background:#f5a623}.b.logic{background:#5c9acd}.b.math{background:#59c059}
.b.func{background:#7b5ea7}.b.loops{background:#40bf4a}
.led-grid{display:inline-grid;grid-template-columns:repeat(5,28px);gap:2px;margin:6px 0}
.led-grid span{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.55em;color:#555}
.led-grid span.on{background:#e74c3c;border-color:#c0392b;color:#fff}

/* Content area */
.content{flex:1;padding:24px 32px;overflow-y:auto;max-height:calc(100vh - 120px)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center}
.empty-state .icon{font-size:3em;margin-bottom:12px}

/* Lesson detail */
.lesson-detail h2{font-size:1.6em;margin-bottom:4px}
.lesson-meta{display:flex;gap:16px;margin-bottom:20px;color:var(--muted);font-size:.88em;flex-wrap:wrap;align-items:center}
.lesson-meta .badge{padding:2px 10px;border-radius:8px;font-size:.8em;font-weight:600}
.lesson-meta .badge.robotics{background:rgba(102,126,234,.15);color:var(--purple)}
.lesson-meta .badge.modeling{background:rgba(0,184,148,.15);color:var(--green)}

/* Section */
.section{margin-bottom:24px}
.section-title{font-size:.85em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Links row */
.file-links{display:flex;flex-wrap:wrap;gap:8px}
.file-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:.88em;font-weight:500;transition:all .2s;border:1px solid var(--border)}
.file-link:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.file-link.presentation{background:rgba(102,126,234,.12);border-color:rgba(102,126,234,.25);color:#8b9cf7}
.file-link.handout{background:rgba(0,184,148,.12);border-color:rgba(0,184,148,.25);color:#4fd1c5}
.file-link.classroom{background:rgba(66,133,244,.1);border-color:rgba(66,133,244,.2);color:#6ea8fe}

/* Project cards */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.project-card:hover{border-color:#444;transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.project-thumb{width:100%;height:180px;background:#12122a;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.project-thumb img{width:100%;height:100%;object-fit:contain}
.project-thumb iframe{width:100%;height:100%;border:none}
.project-thumb .no-thumb{color:#444;font-size:2.5em}
.project-info{padding:12px 14px}
.project-info .label{font-weight:600;font-size:.92em;margin-bottom:4px}
.project-info .proj-link{display:inline-flex;align-items:center;gap:4px;font-size:.8em;color:var(--purple);word-break:break-all}
.project-info .proj-link:hover{text-decoration:underline}
.project-info .proj-link.tinkercad-link{color:var(--green)}

/* MakeCode embed */
.mc-sim{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
.mc-sim iframe{width:100%;height:360px;border:none}

/* Classroom text */
.classroom-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;font-size:.9em;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.classroom-box::-webkit-scrollbar{width:4px}
.classroom-box::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

/* Admin mode */
.admin-bar{display:none;background:#1a0a2e;border-bottom:1px solid rgba(102,126,234,.3);padding:6px 16px;text-align:center;font-size:.8em;color:var(--purple)}
.admin-bar.show{display:flex;align-items:center;justify-content:center;gap:12px}
.admin-bar button{padding:4px 12px;border-radius:6px;border:1px solid rgba(102,126,234,.3);background:rgba(102,126,234,.1);color:var(--purple);cursor:pointer;font-size:.85em}
.admin-bar button:hover{background:rgba(102,126,234,.2)}
.admin-bar button.save{background:var(--purple);color:#fff;border-color:var(--purple)}
.edit-url{display:none;width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:#0d0d1a;color:var(--text);font-size:.82em;margin-top:6px}
.admin-mode .edit-url{display:block}
.add-project{display:none;padding:8px 14px;border-radius:10px;border:2px dashed var(--border);color:var(--muted);cursor:pointer;font-size:.85em;text-align:center;transition:all .2s}
.add-project:hover{border-color:#555;color:var(--text)}
.admin-mode .add-project{display:block}

/* Extras */
.extras-list{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px}
.extras-link{padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);font-size:.8em;color:#aaa}
.extras-link:hover{background:rgba(255,255,255,.08)}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:10px;background:#2d3436;color:#fff;font-size:.85em;z-index:9999;transform:translateX(120%);transition:transform .3s;border-left:4px solid var(--green)}
.toast.show{transform:translateX(0)}

/* Copy button */
.copy-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-size:.78em;transition:all .2s}
.copy-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.copy-btn.copied{background:rgba(0,184,148,.15);color:var(--green);border-color:var(--green)}

/* Mobile toggle */
.sidebar-toggle{display:none;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);cursor:pointer;font-size:.9em;color:var(--muted);text-align:center}
.sidebar-toggle:hover{background:rgba(255,255,255,.04)}

/* Responsive */
@media(max-width:900px){
  .main{flex-direction:column}
  .sidebar{width:100%;min-width:0;max-height:none;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar.collapsed{display:none}
  .sidebar-toggle{display:block}
  .content{max-height:none}
}
</style>
</head>
<body>

<div class="admin-bar" id="adminBar">
  <span>🔐 Адмін-режим</span>
  <button class="save" onclick="saveToGitHub()">💾 Зберегти в GitHub</button>
  <button onclick="exitAdmin()">✕ Вийти</button>
</div>

<div class="header">
  <h1>📚 Матеріали уроків</h1>
  <div class="sub" id="subtitle"></div>
  <div class="cat-tabs" id="catTabs"></div>
  <span class="admin-link" id="adminToggle" title="Адмін">🔐</span>
</div>

<div class="main">
  <div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">📚 Показати список уроків</div>
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content">
    <div class="empty-state"><div class="icon">📚</div><p>Оберіть урок зі списку зліва</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let manifest = null;
let currentCat = 'robotics';
let currentLesson = null;
let isAdmin = false;
let ghToken = localStorage.getItem('gh_token') || '';

async function init() {
  try {
    const r = await fetch('manifest.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    manifest = await r.json();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>Не вдалося завантажити дані.<br>Перезавантажте сторінку.</p></div>';
    return;
  }
  document.getElementById('subtitle').textContent = manifest.site.subtitle;
  document.title = manifest.site.title;
  renderCatTabs();
  renderSidebar();
  restoreFromHash();
}

function restoreFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  if (hash.endsWith('-res')) {
    const gId = hash.replace('-res','');
    const g = manifest.groups.find(g => g.id === gId);
    if (g) { currentCat = g.type; renderCatTabs(); selectResources(gId); return; }
  }
  for (const g of manifest.groups) {
    const lesson = g.lessons.find(l => g.id + '-' + l.n === hash && l.published);
    if (lesson) {
      currentCat = g.type;
      renderCatTabs();
      selectLesson(g.id, lesson.n);
      return;
    }
  }
}
window.addEventListener('hashchange', restoreFromHash);

// --- Category Tabs ---
function renderCatTabs() {
  const el = document.getElementById('catTabs');
  const cats = [
    {id:'robotics', label:'🤖 Робототехніка, 5 клас'},
    {id:'modeling', label:'🎨 3D-моделювання'}
  ];
  el.innerHTML = cats.map(c =>
    `<div class="cat-tab ${c.id}${c.id===currentCat?' active':''}" onclick="switchCat('${c.id}')">${c.label}</div>`
  ).join('');
}

function switchCat(cat) {
  currentCat = cat;
  currentLesson = null;
  renderCatTabs();
  renderSidebar();
  document.getElementById('content').innerHTML =
    '<div class="empty-state"><div class="icon">📚</div><p>Оберіть урок зі списку зліва</p></div>';
}

// --- Sidebar ---
function renderSidebar() {
  const el = document.getElementById('sidebar');
  const groups = manifest.groups.filter(g => g.type === currentCat);
  let html = '';
  groups.forEach(g => {
    const shortName = g.name.replace(/^(Робототехніка|3D-моделювання)\s*/,'');
    html += `<div class="grp-header"><span class="dot ${g.type}"></span>${shortName}</div>`;
    html += `<div class="grp-schedule">📅 ${g.schedule}</div>`;
    // Extras — single clickable item in sidebar
    if (g.extras && g.extras.length) {
      g.extras.forEach(e => {
        if (e.tabs) {
          const isActive = currentLesson === g.id + '-res';
          const activeClass = isActive ? ' active' : '';
          html += `<div class="lesson-item${activeClass}" onclick="selectResources('${g.id}')" style="margin-top:4px">`;
          html += `<span class="num">📚</span><span class="name">${e.label}</span></div>`;
        }
      });
    }
    // Lessons (published first, then unpublished)
    const published = g.lessons.filter(l => l.published);
    const unpublished = g.lessons.filter(l => !l.published);
    const allLessons = isAdmin ? [...published, ...unpublished] : published;
    allLessons.forEach(l => {
      const key = g.id + '-' + l.n;
      const isActive = currentLesson === key;
      const isPub = !!l.published;
      const activeClass = isActive ? (g.type==='modeling'?' active modeling-active':' active') : '';
      const pubClass = isPub ? '' : ' unpublished';
      html += `<div class="lesson-item${activeClass}${pubClass}" onclick="selectLesson('${g.id}',${l.n})">`;
      html += `<span class="num">№${l.n}</span>`;
      html += `<span class="date">${l.date}</span>`;
      html += `<span class="name">${l.title}${l.shared?'<span class=shared-badge>спільний</span>':''}</span>`;
      html += '</div>';
    });
  });
  el.innerHTML = html;
}

function selectLesson(groupId, lessonN) {
  currentLesson = groupId + '-' + lessonN;
  location.hash = currentLesson;
  const group = manifest.groups.find(g => g.id === groupId);
  const lesson = group.lessons.find(l => l.n === lessonN);
  renderSidebar();
  renderLesson(group, lesson);
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('sidebarToggle').textContent = '📚 Показати список уроків';
  }
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');
  sb.classList.toggle('collapsed');
  btn.textContent = sb.classList.contains('collapsed') ? '📚 Показати список уроків' : '📚 Сховати список уроків';
}

let resTab = 'links';
function selectResources(groupId) {
  currentLesson = groupId + '-res';
  location.hash = currentLesson;
  renderSidebar();
  renderResources(groupId);
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('sidebarToggle').textContent = '📚 Показати список уроків';
  }
}

function renderResources(groupId) {
  const group = manifest.groups.find(g => g.id === groupId);
  const extra = group.extras.find(e => e.tabs);
  if (!extra) return;
  const el = document.getElementById('content');
  let html = '<div class="lesson-detail"><h2>📚 Матеріали</h2>';
  html += '<div class="res-tabs">';
  extra.tabs.forEach(t => {
    html += `<div class="res-tab${resTab===t.id?' active':''}" onclick="resTab=\'${t.id}\';renderResources(\'${groupId}\')">${t.label}</div>`;
  });
  html += '</div><div class="res-section">';
  html += getResContent(resTab);
  html += '</div></div>';
  el.innerHTML = html;
}

function getResContent(tab) {
  if (tab === 'links') return `
    <h3>🔗 Основні посилання</h3>
    <div class="res-card"><a href="https://makecode.microbit.org/" target="_blank">MakeCode Simulator</a><p>Онлайн-середовище для програмування micro:bit — тут ми створюємо всі проєкти</p></div>
    <div class="res-card"><a href="https://makecode.microbit.org/reference" target="_blank">Довідник MakeCode</a><p>Опис усіх блоків та категорій — якщо забув що робить якийсь блок</p></div>
    <div class="res-card"><a href="https://microbit.org/get-started/user-guide/overview/" target="_blank">Що таке micro:bit</a><p>Офіційний сайт micro:bit — опис плати, датчиків, кнопок</p></div>`;
  if (tab === 'led') return `
    <h3>Координати</h3>
    <div class="res-card"><p><strong>x</strong> — стовпець (0–4, зліва направо) · <strong>y</strong> — рядок (0–4, зверху вниз)</p>
    <div class="led-grid"><span>0,0</span><span>1,0</span><span>2,0</span><span>3,0</span><span>4,0</span><span>0,1</span><span>1,1</span><span>2,1</span><span>3,1</span><span>4,1</span><span>0,2</span><span>1,2</span><span class="on">2,2</span><span>3,2</span><span>4,2</span><span>0,3</span><span>1,3</span><span>2,3</span><span>3,3</span><span>4,3</span><span>0,4</span><span>1,4</span><span>2,4</span><span>3,4</span><span>4,4</span></div></div>
    <h3>Основні блоки</h3>
    <div class="res-card"><p><span class="b basic">показати значок</span> — вивести іконку (серце, смайлик тощо)</p><p><span class="b basic">показати рядок "текст"</span> — прокрутити текст</p><p><span class="b basic">показати число 5</span> — показати число</p><p><span class="b basic">показати світлодіоди</span> — довільний паттерн 5×5</p><p><span class="b basic">очистити екран</span> — вимкнути всі діоди</p></div>
    <h3>Точкове керування</h3>
    <div class="res-card"><p><span class="b led">засвітити x y</span> — увімкнути один діод</p><p><span class="b led">погасити x y</span> — вимкнути один діод</p></div>
    <h3>Перевірка кордонів</h3>
    <div class="res-card"><p>Координати в межах 0–4. Завжди перевіряй: якщо x &gt; 4 → задати x = 4, якщо x &lt; 0 → задати x = 0</p></div>`;
  if (tab === 'buttons') return `
    <h3>Кнопки</h3>
    <div class="res-card"><table><tr><th>Подія</th><th>Блок</th><th>Опис</th></tr><tr><td>Кнопка A</td><td><span class="b input">коли кнопка A натиснута</span></td><td>Ліва кнопка</td></tr><tr><td>Кнопка B</td><td><span class="b input">коли кнопка B натиснута</span></td><td>Права кнопка</td></tr><tr><td>Обидві</td><td><span class="b input">коли кнопка A+B натиснута</span></td><td>Одночасно</td></tr></table></div>
    <h3>Датчики</h3>
    <div class="res-card"><table><tr><th>Датчик</th><th>Блок</th><th>Значення</th></tr><tr><td>🌡️ Температура</td><td><span class="b input">температура (°C)</span></td><td>Градуси Цельсія</td></tr><tr><td>💡 Освітлення</td><td><span class="b input">рівень освітлення</span></td><td>0–255</td></tr><tr><td>🧭 Компас</td><td><span class="b input">напрямок компаса (°)</span></td><td>0–360°</td></tr><tr><td>📐 Акселерометр</td><td><span class="b input">прискорення (mg) x</span></td><td>Нахил по осях</td></tr></table></div>
    <h3>Жести</h3>
    <div class="res-card"><p><span class="b input">коли струснути</span> — потрус плати</p><p><span class="b input">коли нахил вліво / вправо</span> — нахил плати</p></div>
    <h3>Час</h3>
    <div class="res-card"><p><span class="b input">час роботи (мс)</span> — мілісекунди з моменту запуску. Для ігор на реакцію!</p></div>`;
  if (tab === 'variables') return `
    <h3>Змінні</h3>
    <div class="res-card"><p><span class="b var">задати x значення 0</span> — створити та присвоїти</p><p><span class="b var">змінити x на 1</span> — додати (можна від'ємне)</p></div>
    <h3>Умови</h3>
    <div class="res-card"><p><span class="b logic">якщо ... тоді</span> — виконати якщо правда</p><p><span class="b logic">якщо ... тоді ... інакше</span> — два варіанти</p><p><span class="b logic">і</span> / <span class="b logic">або</span> — поєднати умови</p></div>
    <h3>Порівняння</h3>
    <div class="res-card"><p><span class="b logic">x = 5</span> дорівнює · <span class="b logic">x &gt; 4</span> більше · <span class="b logic">x &lt; 0</span> менше · <span class="b logic">x ≠ 5</span> не дорівнює</p></div>
    <h3>Математика</h3>
    <div class="res-card"><p><span class="b math">випадкове число від 0 до 4</span> — генерує випадкове число</p></div>
    <h3>Цикли</h3>
    <div class="res-card"><p><span class="b basic">завжди</span> — безкінечно</p><p><span class="b loops">повторити 4 рази</span> — фіксована кількість</p><p><span class="b loops">поки ... виконувати</span> — поки умова правдива</p></div>
    <h3>Функції</h3>
    <div class="res-card"><p><span class="b func">функція назваФункції</span> — створити</p><p><span class="b func">викликати назваФункції</span> — виконати</p><p>Категорія: <strong>Розширені → Функції</strong></p></div>`;
  return '';
}

// --- Render lesson detail ---
function renderLesson(group, lesson) {
  const el = document.getElementById('content');
  const basePath = lesson.shared || `${group.path}/lesson-${String(lesson.n).padStart(2,'0')}`;
  let html = '<div class="lesson-detail">';

  // Title
  html += `<h2>${lesson.title}</h2>`;
  html += '<div class="lesson-meta">';
  html += `<span class="badge ${group.type}">${group.type==='robotics'?'Робототехніка':'3D-моделювання'}</span>`;
  html += `<span>📅 ${lesson.date}</span>`;
  html += `<span>Урок №${lesson.n}</span>`;
  if (lesson.shared) html += '<span class="shared-badge" style="font-size:.85em;padding:2px 10px">🔗 Спільний урок</span>';
  html += '</div>';

  // File links
  const files = (lesson.files || []);
  if (files.length) {
    html += '<div class="section">';
    html += '<div class="section-title">📎 Матеріали</div>';
    html += '<div class="file-links">';
    files.forEach(f => {
      const href = `${basePath}/${f}`;
      if (f.includes('presentation')) {
        html += `<a class="file-link presentation" href="${href}" target="_blank">🖥️ Презентація</a>`;
      } else if (f.includes('handout')) {
        html += `<a class="file-link handout" href="${href}" target="_blank">🖨️ Роздатковий матеріал</a>`;
      }
    });
    html += '</div></div>';
  }

  // Projects (MakeCode / Tinkercad)
  const mcProjects = lesson.makecode || [];
  const tcProjects = lesson.tinkercad || [];
  const allProjects = [...mcProjects.map(p=>({...p,type:'makecode'})), ...tcProjects.map(p=>({...p,type:'tinkercad'}))];

  if (allProjects.length || isAdmin) {
    html += '<div class="section">';
    html += `<div class="section-title">${group.type==='robotics'?'🎮':'🔗'} Проєкти</div>`;
    html += '<div class="projects-grid">';
    allProjects.forEach((p, i) => {
      html += renderProjectCard(p, group, lesson, i);
    });
    html += `<div class="add-project" onclick="addProject('${group.id}',${lesson.n})">+ Додати проєкт</div>`;
    html += '</div></div>';
  }

  // MakeCode simulators
  const mcWithUrl = mcProjects.filter(m => m.url);
  if (mcWithUrl.length) {
    html += '<div class="section">';
    html += '<div class="section-title">▶️ Симулятор</div>';
    mcWithUrl.forEach(m => {
      const embedUrl = m.url.replace('/#pub:', '/---run?id=');
      html += `<div class="mc-sim"><iframe src="${embedUrl}" allowfullscreen sandbox="allow-popups allow-forms allow-scripts allow-same-origin"></iframe></div>`;
    });
    html += '</div>';
  }

  // Google Classroom text
  if (files.includes('google_classroom.md')) {
    html += '<div class="section">';
    html += '<div class="section-title">📝 Google Classroom <button class="copy-btn" onclick="copyClassroom()">📋 Скопіювати</button></div>';
    html += `<div class="classroom-box" id="classroomBox">Завантаження...</div>`;
    html += '</div>';
    loadClassroomText(`${basePath}/google_classroom.md`);
  }

  html += '</div>';
  el.innerHTML = html;
}

function renderProjectCard(proj, group, lesson, idx) {
  const type = proj.type;
  const hasUrl = !!proj.url;
  let thumbHtml = '<div class="no-thumb">📦</div>';

  if (hasUrl && type === 'makecode') {
    const id = proj.url.split('/#pub:')[1] || proj.url.split('id=')[1] || '';
    if (id) thumbHtml = `<img src="https://makecode.microbit.org/api/${id}/thumb" alt="${proj.label}" onerror="this.parentElement.innerHTML='<div class=no-thumb>🎮</div>'">`;
  } else if (hasUrl && type === 'tinkercad') {
    const thingId = proj.url.split('/things/')[1]?.split(/[?#/]/)[0] || '';
    if (thingId) thumbHtml = `<iframe src="https://www.tinkercad.com/embed/${thingId}?editbtn=1" loading="lazy"></iframe>`;
  }

  const linkClass = type === 'tinkercad' ? 'proj-link tinkercad-link' : 'proj-link';
  const icon = type === 'makecode' ? '🎮' : '🔗';

  let html = '<div class="project-card">';
  html += `<div class="project-thumb">${thumbHtml}</div>`;
  html += '<div class="project-info">';
  html += `<div class="label">${icon} ${proj.label}</div>`;
  if (hasUrl) html += `<a class="${linkClass}" href="${proj.url}" target="_blank">↗ Відкрити проєкт</a>`;
  else html += `<span style="font-size:.8em;color:#555">Посилання ще не додано</span>`;

  // Admin edit URL
  const arrKey = type === 'makecode' ? 'makecode' : 'tinkercad';
  html += `<input class="edit-url" placeholder="Вставте URL проєкту" value="${proj.url||''}" onchange="updateProjectUrl('${group.id}',${lesson.n},'${arrKey}',${idx},this.value)">`;
  html += '</div></div>';
  return html;
}

async function loadClassroomText(url) {
  try {
    const r = await fetch(url + '?_=' + Date.now());
    const text = await r.text();
    const box = document.getElementById('classroomBox');
    if (box) box.textContent = text;
  } catch(e) {
    const box = document.getElementById('classroomBox');
    if (box) box.textContent = '(не вдалося завантажити)';
  }
}

function copyClassroom() {
  const box = document.getElementById('classroomBox');
  if (!box) return;
  navigator.clipboard.writeText(box.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✅ Скопійовано!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Скопіювати'; btn.classList.remove('copied'); }, 2000); }
  });
}

// --- Admin ---
document.getElementById('adminToggle').addEventListener('click', () => {
  if (isAdmin) { exitAdmin(); return; }
  const pass = prompt('Пароль:');
  if (!pass) return;
  sha256(pass).then(hash => {
    if (hash === '5e4d982a45de7366faf49e14cfc97e4d89fd8a46fc8bb0a72e29b5d15c103b5f') {
      isAdmin = true;
      document.body.classList.add('admin-mode');
      document.getElementById('adminBar').classList.add('show');
      if (!ghToken) {
        ghToken = prompt('GitHub Personal Access Token (repo scope):') || '';
        if (ghToken) localStorage.setItem('gh_token', ghToken);
      }
      renderSidebar();
      toast('Адмін-режим увімкнено');
    } else {
      alert('Невірний пароль');
    }
  });
});

function exitAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBar').classList.remove('show');
  renderSidebar();
}

function updateProjectUrl(groupId, lessonN, arrKey, idx, value) {
  const group = manifest.groups.find(g => g.id === groupId);
  const lesson = group.lessons.find(l => l.n === lessonN);
  if (!lesson[arrKey]) lesson[arrKey] = [];
  if (lesson[arrKey][idx]) lesson[arrKey][idx].url = value;
  // Re-render to show thumbnail
  renderLesson(group, lesson);
}

function addProject(groupId, lessonN) {
  const group = manifest.groups.find(g => g.id === groupId);
  const lesson = group.lessons.find(l => l.n === lessonN);
  const type = group.type === 'robotics' ? 'makecode' : 'tinkercad';
  if (!lesson[type]) lesson[type] = [];
  const label = prompt('Назва проєкту:');
  if (!label) return;
  lesson[type].push({label, url: ''});
  renderLesson(group, lesson);
}

async function saveToGitHub() {
  if (!ghToken) {
    ghToken = prompt('GitHub Personal Access Token:') || '';
    if (!ghToken) return;
    localStorage.setItem('gh_token', ghToken);
  }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(manifest, null, 2) + '\n')));
  try {
    // Get current file SHA
    const getR = await fetch('https://api.github.com/repos/makandrol/school/contents/manifest.json', {
      headers: {'Authorization': 'token ' + ghToken}
    });
    const getData = await getR.json();
    const sha = getData.sha;
    // Update file
    const putR = await fetch('https://api.github.com/repos/makandrol/school/contents/manifest.json', {
      method: 'PUT',
      headers: {'Authorization': 'token ' + ghToken, 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'Update project links via admin', content, sha, branch: 'preview'})
    });
    if (putR.ok) {
      toast('✅ Збережено в GitHub! Netlify перебудує сайт.');
    } else {
      const err = await putR.json();
      toast('❌ Помилка: ' + (err.message || putR.status));
    }
  } catch(e) {
    toast('❌ ' + e.message);
  }
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

init();
